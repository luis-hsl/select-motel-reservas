name: Deploy Supabase Edge Functions to VPS

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

concurrency:
  group: vps-functions
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync functions -> VPS
        # --delete preserva main/ e hello/ (router padrão do edge-runtime que vem do compose oficial)
        run: |
          rsync -az --delete --exclude='/main' --exclude='/hello' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            supabase/functions/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/supabase/app/volumes/functions/

      - name: Restart functions container
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/supabase/app && sudo docker compose restart functions"
