name: Apply DB Migrations to VPS

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

concurrency:
  group: vps-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy migrations to VPS
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            supabase/migrations/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/supabase-migrations/

      - name: Run pending migrations
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "for f in \$(ls /tmp/supabase-migrations/*.sql | sort); do
               echo \"Running \$f...\";
               docker exec supabase-db \
                 psql -U postgres -d postgres -f /dev/stdin < \$f \
                 && echo \"OK: \$f\" \
                 || echo \"SKIP/ERROR: \$f\";
             done"

      - name: Reload PostgREST schema cache
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/supabase/app && sudo docker compose restart rest"
