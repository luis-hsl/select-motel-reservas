name: Apply DB Migrations to VPS

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

concurrency:
  group: vps-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host %s\n  StrictHostKeyChecking no\n  IdentityFile ~/.ssh/id_ed25519\n' "${{ secrets.VPS_HOST }}" >> ~/.ssh/config

      - name: Copy migrations to VPS
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            supabase/migrations/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/supabase-migrations/

      - name: Run pending migrations
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "for f in \$(ls /tmp/supabase-migrations/*.sql | sort); do
               echo \"Running \$f...\";
               docker exec -i supabase-db \
                 psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f /dev/stdin < \$f \
                 && echo \"OK: \$f\" \
                 || echo \"FAILED: \$f\";
             done"

      - name: Reload PostgREST schema cache
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/supabase/app && sudo docker compose restart rest"

      - name: Diagnostics
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            echo '=== funções leads existem? ===';
            docker exec supabase-db psql -U postgres -d postgres -c \
              \"SELECT proname, pg_get_function_identity_arguments(oid) AS args FROM pg_proc WHERE proname IN ('get_leads','insert_lead','update_lead_status') ORDER BY proname;\";
            echo '=== PostgREST logs (últimas 30 linhas) ===';
            cd /opt/supabase/app && sudo docker compose logs --tail=30 rest;
          "
