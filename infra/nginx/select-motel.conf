# /etc/nginx/sites-available/select-motel.conf
# Reverse proxy:
#   /            -> SPA estatica (build do Vite em /var/www/select-motel/dist)
#   /supabase/   -> Supabase Kong (127.0.0.1:8000)  [REST, Auth, Storage, Realtime, Functions]
#   /studio/     -> Supabase Studio (127.0.0.1:3000) [ADMIN — proteja com basic auth]
#
# Wuzapi NAO e exposto publicamente — so as edge functions (que rodam dentro do Supabase)
# o acessam via http://wuzapi:8080 na network docker.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25M;

    # ---- SPA ----
    root /var/www/select-motel/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(?:js|css|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # ---- Supabase API (Kong gateway) ----
    location /supabase/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 86400;
    }

    # ---- Supabase Studio (admin) ----
    # Para proteger, gere htpasswd:  sudo htpasswd -c /etc/nginx/.studio_htpasswd admin
    location /studio/ {
        # auth_basic           "Supabase Studio";
        # auth_basic_user_file /etc/nginx/.studio_htpasswd;

        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
