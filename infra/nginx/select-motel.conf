# /etc/nginx/sites-available/select-motel
#
# Backend do Select Motel. Dominio: api.selectreservas.com.br -> VPS.
# Frontend mora no Vercel (https://www.selectreservas.com.br).
#
# Esta config sobe em HTTP; o `certbot --nginx -d api.selectreservas.com.br --redirect`
# injeta automaticamente o bloco HTTPS e o redirect 80 -> 443.

server {
    listen 80;
    listen [::]:80;
    server_name api.selectreservas.com.br;

    # vídeos das suítes precisam de upload pesado
    client_max_body_size 500M;

    # ---- SPA estatica (uso interno em http://api.* — publico usa Vercel) ----
    root /var/www/select-motel/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(?:js|css|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # ---- Supabase Kong (REST / Auth / Storage / Realtime / Functions) ----
    location /supabase/ {
        # CORS é gerenciado pelo plugin cors do Kong (kong.yml). Não duplicar aqui
        # ou o browser bloqueia por "multiple Access-Control-Allow-Origin headers".
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 86400;
    }

    # ---- Supabase Studio (UI admin — proteger com basic auth quando expor) ----
    location /studio/ {
        # auth_basic           "Supabase Studio";
        # auth_basic_user_file /etc/nginx/.studio_htpasswd;
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
