          "name": "Qual a diferença entre período e pernoite?",
          "acceptedAnswer": {"@type": "Answer", "text": "O período é uma estadia de 2 horas, ideal para um encontro mais curto. Já o pernoite são 12 horas com café da manhã (quando disponível pelo pacote escolhido)."}

          "@type": "Question",
          "name": "Os pacotes incluem decoração romântica?",

        },
        {
          "@type": "Question",
          "name": "Onde fica o Select Motel?",
          "acceptedAnswer": {"@type": "Answer", "text": "O Select Motel fica na Rodovia Celso Fumiu Makita, no Parque Industrial em Ivaiporã (PR), CEP 86870-000. Atendemos clientes de Ivaiporã, Apucarana, Cândido de Abreu, Faxinal e região."}
        },
        {
          "@type": "Question",
          "name": "Posso escolher qual suíte quero?",
